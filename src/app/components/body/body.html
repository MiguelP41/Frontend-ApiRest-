<div class="container-fluid p-0">

  <div *ngIf="mostrarFormulario" class="mb-4">
    <app-form-categoria (categoriaGuardada)="manejarCategoriaGuardada()">
    </app-form-categoria>
  </div>

  <div *ngIf="mostrarTabla">
    <div class="p-4 md:p-6 bg-gray-50 min-h-screen">
      <div class="max-w-6xl mx-auto">

        <!-- Header -->
        <div class="mb-6 md:mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div>
            <h3 class="text-xl md:text-2xl font-bold text-gray-800">Registro de Clientes</h3>
            <p class="text-gray-500 text-sm">Gestiona los clientes registrados.</p>
          </div>
        </div>

        <!-- Contenedor Tabla/Cards -->
        <div class="bg-transparent md:bg-white md:rounded-xl md:shadow-sm md:border md:border-gray-200 overflow-hidden">
          <table class="w-full text-sm text-left block md:table">
            <thead class="bg-gray-50 border-b border-gray-200 hidden md:table-header-group">
              <tr>
                <th class="px-6 py-4 font-semibold text-gray-700 uppercase text-xs tracking-wider md:w-24">#</th>
                <th class="px-6 py-4 font-semibold text-gray-700 uppercase text-xs tracking-wider md:min-w-[150px]">Nombre</th>
                <th class="px-6 py-4 font-semibold text-gray-700 uppercase text-xs tracking-wider md:min-w-[180px]">Apellidos</th>
                <th class="px-6 py-4 font-semibold text-gray-700 uppercase text-xs tracking-wider">PDF</th>
                <th class="px-6 py-4 font-semibold text-gray-700 uppercase text-xs tracking-wider">Acciones</th>
              </tr>
            </thead>
            
            <tbody class="block md:table-row-group">
              <tr *ngFor="let item of arrCategorias" 
                class="bg-white border border-gray-200 rounded-xl shadow-sm mb-4 block p-4 
                       md:table-row md:border-0 md:rounded-none md:shadow-none md:mb-0 md:p-0 
                       md:odd:bg-white md:even:bg-gray-50/80 md:hover:bg-blue-50/50 transition-colors">
                
                <!-- ID -->
                <td class="px-4 py-1 md:px-6 md:py-4 font-mono text-gray-400 text-xs block md:table-cell md:w-24 tabular-nums">
                  <span class="md:hidden font-bold mr-2 text-gray-400">ID:</span>#{{ item.id }}
                </td>

                <!-- Nombre -->
                <td class="px-4 py-1 md:px-6 md:py-4 block md:table-cell md:min-w-[150px]">
                  <span class="md:hidden block text-[10px] font-bold text-gray-400 uppercase mb-1">Nombre</span>
                  <div class="font-medium text-gray-900">{{ item.nombre }}</div>
                </td>

                <!-- Apellidos -->
                <td class="px-4 py-1 md:px-6 md:py-4 text-gray-700 block md:table-cell md:min-w-[180px]">
                  <span class="md:hidden block text-[10px] font-bold text-gray-400 uppercase mb-1">Apellidos</span>
                  {{ item.apellidos }}
                </td>

                <!-- Descarga PDF -->
                <td class="px-4 py-2 md:px-6 md:py-4 block md:table-cell">
                  <span class="md:hidden block text-[10px] font-bold text-gray-400 uppercase mb-2">Expediente</span>
                  <button (click)="handleDescarga(item.id)"
                    class="inline-flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-blue-600 bg-blue-50 border border-blue-200 rounded-lg hover:bg-blue-100 transition"
                    title="Descargar PDF">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                      <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                      <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
                    </svg>
                    Descargar
                  </button>
                </td>

                <!-- Acciones -->
                <td class="px-4 py-3 md:px-6 md:py-4 block md:table-cell">
                  <span class="md:hidden block text-[10px] font-bold text-gray-400 uppercase mb-2">Acciones</span>
                  <div class="flex flex-wrap gap-2">
                    <button (click)="verDetalleHistoria(item.id)"
                      class="flex-1 md:flex-none justify-center inline-flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition">
                      <i class="fas fa-eye"></i> Ver
                    </button>
                    <button
                      class="flex-1 md:flex-none justify-center inline-flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-white bg-cyan-500 rounded-lg hover:bg-cyan-600 transition">
                      <i class="fas fa-edit"></i> Editar
                    </button>
                    <button
                      class="flex-1 md:flex-none justify-center inline-flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-white bg-red-500 rounded-lg hover:bg-red-600 transition">
                      <i class="fas fa-trash"></i> Eliminar
                    </button>
                  </div>
                </td>
              </tr>

              <!-- Sin resultados -->
              <tr *ngIf="!arrCategorias || arrCategorias.length === 0" class="block md:table-row">
                <td colspan="5" class="p-10 text-center block md:table-cell bg-white rounded-xl md:rounded-none">
                  <div class="text-gray-300 mb-2">
                    <svg class="mx-auto h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                  </div>
                  <p class="text-gray-500 font-medium">No hay clientes registrados.</p>
                </td>
              </tr>
            </tbody>
          </table>

          <!-- Paginación -->
          <div class="flex items-center justify-center gap-4 p-4 border-t border-gray-200 bg-white">
            <button (click)="paginaAnterior()" [disabled]="paginaActual === 0"
              class="px-3 md:px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50 transition">
              &laquo; <span class="hidden md:inline">Anterior</span>
            </button>
            <span class="text-sm text-gray-500">
              Página <strong class="text-gray-800">{{ paginaActual + 1 }}</strong> de <strong class="text-gray-800">{{ totalPaginas }}</strong>
            </span>
            <button (click)="paginaSiguiente()" [disabled]="paginaActual === totalPaginas - 1 || totalPaginas === 0"
              class="px-3 md:px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50 transition">
              <span class="hidden md:inline">Siguiente</span> &raquo;
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- El resto de tus modales y lightbox se mantienen igual -->
  ...
</div>
