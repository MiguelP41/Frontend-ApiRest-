<div class="p-6 bg-gray-50 min-h-screen">
  <div *ngIf="!mostrarFormulario" class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-8">
    <div class="flex flex-col">
      <h1 class="text-lg sm:text-xl md:text-2xl font-bold text-gray-800 tracking-tight">Validación de Pagos</h1>
      <span class="text-sm text-gray-500">Gimnasio - Portal Administrativo</span>
    </div>
  </div>

  <div *ngIf="mostrarFormulario" class="mb-8 animate-fade-in-down">
    <app-form-comprobante (comprobanteGuardado)="manejarCategoriaGuardada()">
    </app-form-comprobante>
  </div>

  <div *ngIf="mostrarTabla">
    <div *ngIf="arrCategorias && arrCategorias.length > 0">
      <swiper-container 
        slides-per-view="1" 
        space-between="20" 
        navigation="true" 
        pagination="true"
        class="pb-12"
        breakpoints='{"640": {"slidesPerView": 2}, "1024": {"slidesPerView": 3}}'>
        
        <swiper-slide *ngFor="let item of arrCategorias" class="py-4">
          <div class="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow duration-300 overflow-hidden h-full mx-1">
            <div class="p-5">
              <div class="flex justify-between items-start mb-4">
                <span class="text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-1 rounded-full uppercase">
                  Cliente #{{ item.clienteId }}
                </span>
                <div class="bg-gray-100 p-2 rounded-lg text-gray-400">
                  <i class="fas fa-receipt text-xl"></i>
                </div>
              </div>

              <div class="space-y-3 mb-6">
                <p class="text-sm text-gray-600 flex items-center">
                  <i class="fas fa-calendar-alt w-6 text-gray-400"></i>
                  <span class="font-medium">{{ item.fechaRegistro | date:'dd/MM/yyyy' }}</span>
                </p>
                <p class="text-sm text-gray-600 flex items-center">
                  <i class="fas fa-money-bill-wave w-6 text-gray-400"></i>
                  <span class="text-lg font-bold text-gray-800">{{ item.monto }} $</span>
                </p>
              </div>

              <div class="flex items-center justify-between pt-4 border-t border-gray-100">
                <div class="flex space-x-2">
                  <button (click)="verDetalleHistoria(item.id)" 
                          class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors">
                    <i class="fas fa-eye"></i>
                  </button>
                  <button (click)="handleDescarga(item.id)" 
                          class="p-2 text-green-600 hover:bg-green-50 rounded-lg transition-colors">
                    <i class="fas fa-file-pdf"></i>
                  </button>
                </div>
                <div class="flex space-x-1">
                  <button class="px-3 py-1 text-xs font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded transition-colors">
                    Editar
                  </button>
                  <button class="px-3 py-1 text-xs font-medium text-white bg-red-500 hover:bg-red-600 rounded transition-colors">
                    Eliminar
                  </button>
                </div>
              </div>
            </div>
          </div>
        </swiper-slide>
      </swiper-container>
    </div>

    <div *ngIf="!arrCategorias || arrCategorias.length === 0" 
         class="flex flex-col items-center justify-center py-20 bg-white rounded-2xl border-2 border-dashed border-gray-200">
      <i class="fas fa-inbox text-5xl text-gray-200 mb-4"></i>
      <p class="text-gray-500 font-medium">Aún no tienes registros de pagos.</p>
    </div>
  </div>
</div>
