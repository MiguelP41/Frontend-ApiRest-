<div class="p-4 bg-gray-50">
  
  <div *ngIf="!mostrarFormulario" class="mb-6">
    <h1 class="h3 text-XL md:text-xl font-bold text-gray-800 tracking-tight">Validación de Pagos</h1>
    <span class="text-sm text-gray-500">Gimnasio - Portal Administrativo</span>
  </div>

  <div *ngIf="mostrarFormulario" class="mb-6 animate-fade-in-down">
    <app-form-comprobante (comprobanteGuardado)="manejarCategoriaGuardada()">
    </app-form-comprobante>
  </div>

  <div *ngIf="mostrarTabla">
    <div *ngIf="arrComprobantes && arrComprobantes.length > 0">
      <swiper-container 
        slides-per-view="1" 
        space-between="20" 
        navigation="true" 
        pagination="true"
        class="h-[360px] swiper-ajustado"
        breakpoints='{"640": {"slidesPerView": 2}, "1024": {"slidesPerView": 3}}'>
        
        <swiper-slide *ngFor="let item of arrComprobantes" class="py-2">
          <div class="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow duration-300 mx-1">
            <div class="p-4">
              <div class="flex justify-between items-start mb-4">
                <span class="text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-1 rounded-full uppercase">
                  Cliente #{{ item.clienteId }}
                </span>
                <div class="bg-gray-100 p-2 rounded-lg text-gray-400">
                  <i class="fas fa-receipt text-xl"></i>
                </div>
              </div>

              <div class="space-y-3 mb-6">
                <p class="text-sm text-gray-600 flex items-center">
                  <i class="fas fa-calendar-alt w-6 text-gray-400"></i>
                  <span class="font-medium">{{ item.fechaRegistro | date:'dd/MM/yyyy' }}</span>
                </p>
                
                <p class="text-sm text-gray-600 flex items-center">
                  <i class="fas fa-hashtag w-6 text-gray-400"></i>
                  <span class="text-xl font-bold text-gray-800">{{ item.referenciaBancaria }}</span>
                </p>
                <p class="text-sm text-gray-600 flex items-center">
                  <i class="fas fa-money-bill-wave w-6 text-gray-400"></i>
                  <span class="text-xl font-bold text-gray-800">{{ item.monto }} $</span>
                </p>
              </div>

              <div class="flex items-center justify-between pt-4 border-t border-gray-100">
                <div class="flex space-x-2">
                  <button (click)="verDetalleHistoria(item.id)" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg">
                    <i class="fas fa-eye"></i>
                  </button>
                  <button (click)="handleDescarga(item.id)" class="p-2 text-green-600 hover:bg-green-50 rounded-lg">
                    <i class="fas fa-file-pdf"></i>
                  </button>
                </div>
                <div class="flex space-x-1">
                  <button class="px-3 py-1 text-xs font-medium text-gray-600 bg-gray-100 rounded">Editar</button>
                  <button class="px-3 py-1 text-xs font-medium text-white bg-red-500 rounded">Eliminar</button>
                </div>
              </div>
            </div>
          </div>
        </swiper-slide>
      </swiper-container>
    </div>
  </div>
  
  </div>
