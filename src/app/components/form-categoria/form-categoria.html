<div class="container my-4 card p-4 shadow-lg rounded-lg">
    <h2 class="card-title text-2xl font-semibold text-gray-700 mb-4">Cargar Usuario</h2>
    
    <form [formGroup]="categoriaForm" (ngSubmit)="guardarCategoria2()">
        
        <!-- Campo Nombre -->
        <div class="mb-2"> 
            <label for="nombre" class="form-label block text-sm font-medium text-gray-600">Nombres:</label>
            
            <input 
                type="text" 
                id="nombre" 
                formControlName="nombre" 
                class="form-control mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" 
                required>

            <!-- Mensaje de Validación para Nombre -->
            <div 
                *ngIf="categoriaForm.get('nombre')?.invalid && categoriaForm.get('nombre')?.touched" 
                class="text-red-500 text-xs mt-1"> 
                El campo es obligatorio.
            </div>
        </div>

         <!-- Campo Apellidos -->
        <div class="mb-2"> 
            <label for="apellidos" class="form-label block text-sm font-medium text-gray-600">Apellidos:</label>
            
            <input 
                type="text" 
                id="apellidos" 
                formControlName="apellidos" 
                class="form-control mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" 
                required>

            <!-- Mensaje de Validación para Nombre -->
            <div 
                *ngIf="categoriaForm.get('apellidos')?.invalid && categoriaForm.get('apellidos')?.touched" 
                class="text-red-500 text-xs mt-1"> 
                El campo es obligatorio.
            </div>
        </div>

        <!-- Campo Correo Electronico -->
        <div class="mb-2"> 
            <label for="correo" class="form-label block text-sm font-medium text-gray-600">Edad:</label>
            
            <input 
                type="number" 
                id="correo" 
                formControlName="correo" 
                class="form-control mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" 
                required>

            <!-- Mensaje de Validación para Nombre -->
            <div 
                *ngIf="categoriaForm.get('correo')?.invalid && categoriaForm.get('correo')?.touched" 
                class="text-red-500 text-xs mt-1"> 
                El campo es obligatorio.
            </div>
        </div>
        
        <!-- Campo Descripción -->
        <div class="mb-6">
            <label for="descripcion" class="form-label block text-sm font-medium text-gray-600">Descripción:</label>
            
            <textarea 
                id="descripcion" 
                formControlName="descripcion" 
                class="form-control mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                placeholder="Información Adicional"
                rows="3"></textarea>
            
            <!-- Mensaje de Validación para Descripción -->
            <div 
                *ngIf="categoriaForm.get('descripcion')?.invalid && categoriaForm.get('descripcion')?.touched" 
                class="text-red-500 text-xs mt-1"> 
                La descripción es obligatoria.
            </div>
        </div>

        <div class="mb-2"> 
    <label for="imagen" class="form-label block text-sm font-medium text-gray-600">Cargar Estudio 1:</label>
    
    <input 
        type="file" 
        id="imagen" 
        (change)="onFileSelected($event, 1)" 
        class="form-control mt-1 block w-full text-gray-700 bg-white border border-gray-300 rounded-md shadow-sm focus:border-indigo-500 focus:ring-indigo-500" 
        accept="image/*">
    
    <div 
        *ngIf="categoriaForm.get('imagen1')?.invalid && categoriaForm.get('imagen1')?.touched" 
        class="text-red-500 text-xs mt-1"> 
        Debe seleccionar una imagen.
    </div>
</div>


          <div class="mb-2"> 
    <label for="imagen" class="form-label block text-sm font-medium text-gray-600">Cargar Estudio 2:</label>
    
    <input 
        type="file" 
        id="imagen" 
        (change)="onFileSelected($event, 2)" 
        class="form-control mt-1 block w-full text-gray-700 bg-white border border-gray-300 rounded-md shadow-sm focus:border-indigo-500 focus:ring-indigo-500" 
        accept="image/*">
    
    <div 
        *ngIf="categoriaForm.get('imagen2')?.invalid && categoriaForm.get('imagen2')?.touched" 
        class="text-red-500 text-xs mt-1"> 
        Debe seleccionar una imagen.
    </div>
</div>

  <div class="mb-2"> 
    <label for="imagen" class="form-label block text-sm font-medium text-gray-600">Cargar Estudio 3:</label>
    
    <input 
        type="file" 
        id="imagen" 
        (change)="onFileSelected($event, 3)" 
        class="form-control mt-1 block w-full text-gray-700 bg-white border border-gray-300 rounded-md shadow-sm focus:border-indigo-500 focus:ring-indigo-500" 
        accept="image/*">
    
    <div 
        *ngIf="categoriaForm.get('imagen3')?.invalid && categoriaForm.get('imagen3')?.touched" 
        class="text-red-500 text-xs mt-1"> 
        Debe seleccionar una imagen.
    </div>
</div>


        
        <!-- Bloque de Botones (Nuevo) -->
        <div class="flex justify-end gap-3 mt-4">
            
            <!-- 🆕 Botón CANCELAR: Al hacer clic, llama a la función que notifica al padre para regresar a la tabla. -->
            <button 
                type="button" 
                class="btn btn-secondary px-4 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition duration-150 ease-in-out" 
                (click)="cancelarFormulario()">
                Cancelar
            </button>

            <!-- Botón GUARDAR -->
            <button 
                type="submit" 
                [disabled]="categoriaForm.invalid || (!selectedFile1 && !selectedFile2 && !selectedFile3)"
                class="btn btn-success px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50 transition duration-150 ease-in-out"> 
                Guardar Categoría
            </button>
        </div>
    </form>
</div>
